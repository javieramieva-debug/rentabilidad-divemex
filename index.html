<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rentabilidad Divemex</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { 
    background:linear-gradient(135deg,#0a1a0f 0%,#1B4332 60%,#0d2018 100%);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:'Segoe UI',system-ui,sans-serif;
  }
  .box {
    background:#fff; border-radius:20px; padding:44px 40px 40px;
    width:100%; max-width:420px; box-shadow:0 24px 64px rgba(0,0,0,.5);
    text-align:center;
  }
  .logo-img { width:180px; margin:0 auto 20px; display:block; background:#000; border-radius:12px; padding:12px; }
  .title { font-size:22px; font-weight:700; color:#1B4332; margin-bottom:4px; }
  .sub { font-size:12px; color:#6C757D; margin-bottom:28px; letter-spacing:.3px; }
  input {
    width:100%; padding:13px 16px; border:1.5px solid #E9ECEF; border-radius:10px;
    font-size:15px; outline:none; margin-bottom:12px; color:#1A1A2E;
    font-family:inherit; transition:.2s;
  }
  input:focus { border-color:#52B788; box-shadow:0 0 0 3px rgba(82,183,136,.15); }
  .btn-enter {
    width:100%; padding:13px; background:#1B4332; color:#fff; border:none;
    border-radius:10px; font-size:15px; font-weight:700; cursor:pointer;
    font-family:inherit; transition:.2s;
  }
  .btn-enter:hover { background:#2D6A4F; }
  .err { color:#C0392B; font-size:13px; margin-top:12px; min-height:18px; font-weight:500; }
  .footer { font-size:11px; color:#adb5bd; margin-top:20px; }

  /* Selector */
  #login-section, #selector-section { transition:.2s; }
  #selector-section { display:none; }
  .sel-sub { font-size:12px; color:#6C757D; margin-bottom:24px; }
  .plant-btn {
    width:100%; padding:16px 20px; margin-bottom:12px;
    background:rgba(27,67,50,0.06); border:1.5px solid rgba(27,67,50,0.2);
    border-radius:12px; cursor:pointer; display:flex; align-items:center; gap:16px;
    font-family:inherit; text-align:left; transition:.2s;
  }
  .plant-btn:hover { background:rgba(27,67,50,0.12); border-color:#1B4332; }
  .plant-icon {
    width:44px; height:44px; background:#1B4332; border-radius:10px;
    display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0;
  }
  .plant-name { font-size:16px; font-weight:700; color:#1B4332; }
  .plant-city { font-size:12px; color:#6C757D; margin-top:2px; }
  .plant-arrow { margin-left:auto; font-size:20px; color:#1B4332; }
  .btn-logout {
    background:none; border:none; color:#adb5bd; font-size:12px;
    cursor:pointer; margin-top:8px; font-family:inherit; text-decoration:underline;
  }
</style>
</head>
